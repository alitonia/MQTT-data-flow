version: '3.8'

services:

  # ======================
  # MQTT BROKERS (SCALE)
  # ======================
  mosquitto1:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto1
    ports:
      - "1884:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  mosquitto2:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto2
    ports:
      - "1885:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # ======================
  # LOAD BALANCER (GATEWAY)
  # ======================
  haproxy:
    image: haproxy:latest
    container_name: mqtt-lb
    ports:
      - "1883:1883"   # ENTRY POINT cho tất cả edge
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      - mosquitto1
      - mosquitto2

  # ======================
  # INFLUXDB
  # ======================
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=my-org
      - DOCKER_INFLUXDB_INIT_BUCKET=my-bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # ======================
  # GRAFANA
  # ======================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

  # ======================
  # CLOUD CONSUMER
  # ======================
  cloud-worker:
    build: ./cloud
    container_name: cloud-worker
    depends_on:
      - haproxy
      - influxdb
    environment:
      - MQTT_BROKER=haproxy
      - MQTT_PORT=1883
      - MQTT_TOPIC=factory/turbofan/data
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=my-super-secret-auth-token
      - INFLUX_ORG=my-org
      - INFLUX_BUCKET=my-bucket

  # ======================
  # EDGE NODES (DATASET)
  # ======================
  edge-node-1:
    build: ./edge
    container_name: edge-node-1
    depends_on:
      - haproxy
    environment:
      - MQTT_BROKER=haproxy
      - MQTT_PORT=1883
      - MQTT_TOPIC=factory/turbofan/data
      - DATA_FILE=/app/data/train_FD001.txt
      - DB_FILE=/app/buffer_1.db
      - SIM_DELAY=0.1
      - BATCH_SIZE=10
    volumes:
      - "./archive-NASA C-MAPSS-1 Turbofan Engine Degradation Dataset:/app/data:ro"

  edge-node-2:
    build: ./edge
    container_name: edge-node-2
    depends_on:
      - haproxy
    environment:
      - MQTT_BROKER=haproxy
      - MQTT_PORT=1883
      - MQTT_TOPIC=factory/turbofan/data
      - DATA_FILE=/app/data/train_FD002.txt
      - DB_FILE=/app/buffer_2.db
      - SIM_DELAY=0.1
      - BATCH_SIZE=10
    volumes:
      - "./archive-NASA C-MAPSS-1 Turbofan Engine Degradation Dataset:/app/data:ro"

  edge-node-3:
    build: ./edge
    container_name: edge-node-3
    depends_on:
      - haproxy
    environment:
      - MQTT_BROKER=haproxy
      - MQTT_PORT=1883
      - MQTT_TOPIC=factory/turbofan/data
      - DATA_FILE=/app/data/train_FD003.txt
      - DB_FILE=/app/buffer_3.db
      - SIM_DELAY=0.1
      - BATCH_SIZE=10
    volumes:
      - "./archive-NASA C-MAPSS-1 Turbofan Engine Degradation Dataset:/app/data:ro"

  edge-node-4:
    build: ./edge
    container_name: edge-node-4
    depends_on:
      - haproxy
    environment:
      - MQTT_BROKER=haproxy
      - MQTT_PORT=1883
      - MQTT_TOPIC=factory/turbofan/data
      - DATA_FILE=/app/data/train_FD004.txt
      - DB_FILE=/app/buffer_4.db
      - SIM_DELAY=0.1
      - BATCH_SIZE=10
    volumes:
      - "./archive-NASA C-MAPSS-1 Turbofan Engine Degradation Dataset:/app/data:ro"

  # ======================
  # EDGE WILD (SIMULATION)
  # ======================
  edge-wild-1:
    build: ./edge-wild
    container_name: edge-wild-1
    depends_on:
      - haproxy
    environment:
      - MQTT_BROKER=haproxy
      - MQTT_PORT=1883
      - MQTT_TOPIC=factory/turbofan/data
      - NODE_ID=wild-01
      - DB_FILE=/app/buffer_wild_1.db
      - SIM_DELAY=0.2
      - BATCH_SIZE=10

  edge-wild-2:
    build: ./edge-wild
    container_name: edge-wild-2
    depends_on:
      - haproxy
    environment:
      - MQTT_BROKER=haproxy
      - MQTT_PORT=1883
      - MQTT_TOPIC=factory/turbofan/data
      - NODE_ID=wild-02
      - DB_FILE=/app/buffer_wild_2.db
      - SIM_DELAY=0.2
      - BATCH_SIZE=10

  edge-wild-3:
    build: ./edge-wild
    container_name: edge-wild-3
    depends_on:
      - haproxy
    environment:
      - MQTT_BROKER=haproxy
      - MQTT_PORT=1883
      - MQTT_TOPIC=factory/turbofan/data
      - NODE_ID=wild-03
      - DB_FILE=/app/buffer_wild_3.db
      - SIM_DELAY=0.2
      - BATCH_SIZE=10

  edge-wild-4:
    build: ./edge-wild
    container_name: edge-wild-4
    depends_on:
      - haproxy
    environment:
      - MQTT_BROKER=haproxy
      - MQTT_PORT=1883
      - MQTT_TOPIC=factory/turbofan/data
      - NODE_ID=wild-04
      - DB_FILE=/app/buffer_wild_4.db
      - SIM_DELAY=0.2
      - BATCH_SIZE=10

volumes:
  influxdb_data:
  grafana_data: